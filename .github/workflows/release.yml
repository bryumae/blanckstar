name: release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Test (src/core/ coverage gate)
        run: npm test
      - name: Build
        run: npm run build
      - name: Zip the build
        run: |
          cd dist
          zip -r ../blanckstar-dist.zip .
          cd ..
          shasum -a 256 blanckstar-dist.zip > blanckstar-dist.zip.sha256
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            blanckstar-dist.zip \
            blanckstar-dist.zip.sha256
