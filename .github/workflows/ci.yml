name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Test (vitest + src/core/ coverage gate)
        run: npm test
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: blanckstar-dist
          path: dist/
          retention-days: 14
      - name: Smoke test the built bundle
        run: |
          set -euo pipefail
          npm run preview -- --port 4173 --host 127.0.0.1 &
          pid=$!
          for i in $(seq 1 20); do curl -fsS "http://127.0.0.1:4173/" >/dev/null 2>&1 && break; sleep 0.5; done
          curl -fsS "http://127.0.0.1:4173/" >/dev/null
          kill "$pid"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: E2E (Playwright — Chromium + Firefox + WebKit)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-results
          path: test-results/
          retention-days: 14
